[market.HK.overrides]
"0005.HK" = 100000
"0700.HK" = 20000

[market.CN]
universe_file = "configs/cn_universe.csv"
sessions = ["09:30-11:30", "13:00-15:00"]

[market.TW]
universe_file = "configs/tw_universe.csv"
sessions = ["09:00-13:30"]
